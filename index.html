<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>New Frontier 9 / Void Courier Prototype</title>
<style>
html,body{margin:0;height:100%;background:#050505;color:#ddd;font-family:Consolas,monospace;overflow:hidden;touch-action:none}#wrap{height:100%;display:flex;align-items:center;justify-content:center;gap:18px;padding:12px;box-sizing:border-box}canvas{width:min(92vw,1024px);height:auto;image-rendering:pixelated;border:4px solid #222;box-shadow:0 0 0 2px #555,0 0 32px #000;background:#000}#help{max-width:330px;font-size:13px;line-height:1.5;color:#aaa}b{color:#fff}.k{color:#ffff33}#mobileControls{display:none;position:fixed;left:0;right:0;bottom:0;height:156px;pointer-events:none;z-index:10}.pad,.act{position:absolute;bottom:14px;display:grid;gap:8px;pointer-events:auto}.pad{left:14px;grid-template-columns:48px 48px 48px;grid-template-rows:48px 48px 48px}.act{right:14px;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px}.btn{border:2px solid #666;background:rgba(0,0,0,.58);color:#ffff33;font:700 13px Consolas,monospace;border-radius:8px;box-shadow:0 0 0 1px #111 inset;user-select:none;-webkit-user-select:none}.btn:active,.btn.on{background:rgba(215,215,0,.26);color:#fff}.pad .up{grid-column:2;grid-row:1}.pad .left{grid-column:1;grid-row:2}.pad .down{grid-column:2;grid-row:3}.pad .right{grid-column:3;grid-row:2}.act .fire{grid-column:2/4;grid-row:1}.act .z{grid-column:1;grid-row:2}.act .x{grid-column:2;grid-row:2}.act .enter{grid-column:3;grid-row:2}@media(max-width:900px){#wrap{flex-direction:column}#help{max-width:92vw}}@media(max-width:760px),(pointer:coarse){#wrap{height:calc(100% - 156px);padding:6px;justify-content:flex-start;gap:6px}canvas{width:min(98vw,calc((100vh - 176px)*1.333));max-height:calc(100vh - 176px);border-width:3px}#help{font-size:11px;line-height:1.25;max-height:70px;overflow:hidden;opacity:.78}#mobileControls{display:block}}@media(max-height:560px) and (orientation:landscape){#wrap{height:100%;padding:4px 170px 4px 170px;justify-content:center}canvas{width:min(calc(100vw - 350px),calc(100vh - 20px)*1.333);max-height:calc(100vh - 20px)}#help{display:none}#mobileControls{height:100%;bottom:0}.pad{bottom:18px}.act{bottom:18px}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game" width="768" height="576"></canvas>
<div id="help"><b>NEW FRONTIER 9 / VOID COURIER</b><br><br>ZX 스펙트럼풍 운송 로그라이트 1차 프로토타입.<br>구간 정보를 분석하고, 무엇을 실을지 결정한 뒤 수송선을 직접 몰고 돌파합니다.<br><br><span class="k">↑↓←→ / WASD</span> 이동<br><span class="k">SPACE</span> 발사<br><span class="k">Z</span> 실드 과충전<br><span class="k">X</span> 플레어 교란<br><span class="k">ENTER</span> 선택/진행<br><span class="k">BACKSPACE</span> 뒤로/적재 제거<br><span class="k">R</span> 재시작<br><br>메뉴에서는 1회 입력, 전투에서는 지속 입력.</div>
</div>
<div id="mobileControls" aria-label="mobile controls"><div class="pad"><button class="btn up" data-key="ArrowUp">▲</button><button class="btn left" data-key="ArrowLeft">◀</button><button class="btn right" data-key="ArrowRight">▶</button><button class="btn down" data-key="ArrowDown">▼</button></div><div class="act"><button class="btn fire" data-key="Space">FIRE</button><button class="btn z" data-key="KeyZ">Z</button><button class="btn x" data-key="KeyX">X</button><button class="btn enter" data-key="Enter">OK</button></div></div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
const W=256,H=192,screen=document.createElement('canvas');screen.width=W;screen.height=H;const g=screen.getContext('2d');g.imageSmoothingEnabled=false;
const C={black:'#000',blue:'#0000d7',red:'#d70000',mag:'#d700d7',green:'#00d700',cyan:'#00d7d7',yellow:'#d7d700',white:'#d7d7d7',bw:'#fff',br:'#f33',bg:'#3f3',bc:'#3ff',by:'#ff3'};
const keys={},taps={};
function isMenuMode(){return !S||S.mode!=='run'}
addEventListener('keydown',e=>{if(!e.repeat)taps[e.code]=1;keys[e.code]=1;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Backspace'].includes(e.code))e.preventDefault();if(e.code==='KeyR')reset()});
addEventListener('keyup',e=>{keys[e.code]=0});
document.querySelectorAll('[data-key]').forEach(btn=>{const code=btn.dataset.key;const down=e=>{e.preventDefault();btn.classList.add('on');if(isMenuMode()){taps[code]=1;keys[code]=1;setTimeout(()=>{if(isMenuMode())keys[code]=0},40)}else keys[code]=1};const up=e=>{e&&e.preventDefault();keys[code]=0;btn.classList.remove('on')};btn.addEventListener('pointerdown',down);btn.addEventListener('pointerup',up);btn.addEventListener('pointercancel',up);btn.addEventListener('pointerleave',up)});
const rnd=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const sectors=[{id:1,name:'SECTOR 01 / DEAD BEACON',free:'BIO LOW / DEBRIS LOW / SIGNAL STABLE',scan:['small swarm pockets ahead','ammo demand low; cargo capacity safe','rear ambush chance 22%; shields optional'],danger:1,swarm:.8,shoot:.12,mine:.04,debris:.03,dur:38,col:C.green},{id:2,name:'SECTOR 02 / RED SPORE TIDE',free:'BIO HIGH / SIGNAL BROKEN / LOSSES 7 SHIPS',scan:['dense assault organisms detected','high ammo burn; flare reduces lock-on','weak ranged presence; speed and fire rate favored'],danger:2,swarm:1.35,shoot:.15,mine:.08,debris:.04,dur:46,col:C.red},{id:3,name:'SECTOR 03 / BLACK ORBIT WRECKS',free:'DEBRIS HIGH / BIO MED / NAV CORRUPTED',scan:['collision risk extreme','shield and repair cargo favored','mines hidden in wreck shadow; avoid center lanes'],danger:3,swarm:.85,shoot:.25,mine:.35,debris:.18,dur:50,col:C.yellow},{id:4,name:'SECTOR 04 / HIVE MOUTH',free:'BIO EXTREME / SIGNAL SCREAMING / RETURN NONE',scan:['all readings moving toward convoy vector','balanced loadout required; cargo overload fatal','final wave targets cargo bay directly'],danger:4,swarm:1.55,shoot:.45,mine:.22,debris:.08,dur:58,col:C.mag}];
const items=[{k:'sup',n:'SUPPLIES',d:'목적지 보상. 전투 도움 없음.',score:120},{k:'ammo',n:'AMMO CRATE',d:'탄약 +24. 공간 1칸 소모.',ammo:24},{k:'shield',n:'SHIELD CELL',d:'실드 +18. Z 과충전 효율 증가.',shield:18},{k:'people',n:'EVACUEES',d:'사람 수송. 도착 보상 큼, 피격 시 손실.',people:8,score:180},{k:'scan',n:'SCAN CORE',d:'분석 비용 감소. 더 깊은 구간 정보 판독.',scan:1},{k:'flare',n:'FLARE POD',d:'X 사용 횟수 +2. 군집 유도 교란.',flare:2},{k:'gun',n:'GUN PARTS',d:'연사력 증가. 탄약 소비도 빨라짐.',gun:1}];
let S,last=performance.now();
function reset(){S={mode:'brief',si:0,analysis:0,budget:5,sel:0,load:[],slots:8,credits:0,msg:'ENTER: analyze or prepare',ship:null,bul:[],en:[],pt:[],stars:[],timer:0,spawn:0,result:null,l:{}};for(let i=0;i<70;i++)S.stars.push({x:rnd(0,W),y:rnd(24,H-14),s:Math.random()<.12?2:1})}
function press(code,name){if(taps[code]){taps[code]=0;S.l[name]=1;return true}if(keys[code]&&!S.l[name]){S.l[name]=1;return true}if(!keys[code])S.l[name]=0;return false}
function loadStats(){const r={ammo:0,shield:0,people:0,sup:0,scan:0,flare:0,gun:0,cells:0};for(const it of S.load){if(it.k==='ammo')r.ammo+=it.ammo;if(it.k==='shield'){r.shield+=it.shield;r.cells++}if(it.k==='people')r.people+=it.people;if(it.k==='sup')r.sup++;if(it.k==='scan')r.scan++;if(it.k==='flare')r.flare+=it.flare;if(it.k==='gun')r.gun++}return r}
function cost(){return Math.max(1,2-loadStats().scan)}
function startRun(){const L=loadStats();S.mode='run';S.ship={x:42,y:H/2,r:5,hp:100+L.shield,max:100+L.shield,cargo:100,ammo:44+L.ammo,flare:1+L.flare,gun:1+L.gun,people:L.people,sup:L.sup,cells:L.cells,speed:1.2-Math.max(0,S.load.length-6)*.025,cd:0,inv:0,over:0};S.bul=[];S.en=[];S.pt=[];S.timer=0;S.spawn=0;S.msg='DELIVER OR DIE'}
function update(dt){if(S.mode==='brief')brief();else if(S.mode==='load')load();else if(S.mode==='run')run(dt);else if(S.mode==='result')result()}
function brief(){if(press('Enter','e')){const c=cost();if(S.analysis<3&&S.budget>=c){S.analysis++;S.budget-=c;S.msg='SCAN DEPTH +'+S.analysis}else{S.mode='load';S.msg='SELECT CARGO / MODULES'}}if(press('Backspace','b')&&S.analysis>0){S.analysis--;S.budget+=cost()}}
function load(){if(press('ArrowUp','u')||press('KeyW','u'))S.sel=(S.sel+items.length-1)%items.length;if(press('ArrowDown','d')||press('KeyS','d'))S.sel=(S.sel+1)%items.length;if(press('Enter','e')){if(S.load.length<S.slots)S.load.push(items[S.sel]);else startRun()}if(press('Backspace','b')){if(S.load.length)S.load.pop();else S.mode='brief'}if(press('Space','sp')&&S.load.length)startRun()}
function run(dt){const sh=S.ship,sec=sectors[S.si];S.timer+=dt;S.spawn-=dt;sh.cd-=dt;sh.inv-=dt;sh.over-=dt;for(const st of S.stars){st.x-=(18+sec.danger*6)*dt*st.s;if(st.x<0){st.x=W;st.y=rnd(24,H-14)}}let mx=0,my=0;if(keys.ArrowLeft||keys.KeyA)mx--;if(keys.ArrowRight||keys.KeyD)mx++;if(keys.ArrowUp||keys.KeyW)my--;if(keys.ArrowDown||keys.KeyS)my++;let l=Math.hypot(mx,my)||1;sh.x=clamp(sh.x+mx/l*sh.speed*72*dt,10,W-14);sh.y=clamp(sh.y+my/l*sh.speed*72*dt,30,H-18);if(keys.Space&&sh.cd<=0&&sh.ammo>0){sh.ammo--;sh.cd=Math.max(.075,.18-sh.gun*.025);const sp=sh.gun>=2?[-.08,.08]:[0];for(const a of sp)S.bul.push({x:sh.x+6,y:sh.y,vx:170,vy:a*170,life:1.2})}if(press('KeyZ','z')&&sh.over<=0&&sh.cells>0){sh.over=8;sh.inv=1.6;sh.hp=clamp(sh.hp+9,0,sh.max);burst(sh.x,sh.y,C.cyan,18)}if(press('KeyX','x')&&sh.flare>0){sh.flare--;for(const e of S.en)if(e.type!=='debris'){e.conf=2.3;e.vx*=-.4}burst(sh.x,sh.y,C.yellow,26)}if(S.spawn<=0){spawn(sec);S.spawn=Math.max(.18,rnd(.7,1.4)/sec.swarm)}if(sec.id===4&&S.timer>sec.dur*.72&&Math.random()<.04)spawn({...sec,shoot:.8,mine:.2});for(const b of S.bul){b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt}S.bul=S.bul.filter(b=>b.life>0&&b.x<W+8);for(const e of S.en){e.conf-=dt;if(e.type==='mine'||e.type==='debris'||e.type==='bolt'){e.x+=e.vx*dt;e.y+=e.vy*dt}else{const ty=e.conf>0?e.y+Math.sin(S.timer*8+e.x)*40:sh.y;e.vx=-e.speed;e.vy+=clamp((ty-e.y)*.9,-45,45)*dt;e.vy=clamp(e.vy,-42,42);e.x+=e.vx*dt;e.y+=e.vy*dt}if(e.type==='shoot'){e.cd-=dt;if(e.cd<=0&&e.x>60){e.cd=rnd(1.2,2.2);S.en.push({type:'bolt',x:e.x-4,y:e.y,vx:-78,vy:rnd(-14,14),hp:1,r:2,col:C.cyan,dmg:8,conf:0})}}}
for(const b of S.bul)for(const e of S.en){if(e.type==='bolt')continue;if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+2){e.hp--;b.life=0;spark(e.x,e.y,e.col);if(e.hp<=0){e.dead=1;burst(e.x,e.y,e.col,6)}break}}
for(const e of S.en){if(e.dead)continue;if(Math.hypot(sh.x-e.x,sh.y-e.y)<sh.r+e.r){e.dead=1;damage(e.dmg||12);burst(e.x,e.y,C.red,8)}}for(const e of S.en)if(e.x<-8&&!e.dead){e.dead=1;if(e.type!=='debris'){sh.cargo-=e.type==='swarm'?6:10;if(sh.people>0&&Math.random()<.25)sh.people=Math.max(0,sh.people-1)}}S.en=S.en.filter(e=>!e.dead&&e.x>-20&&e.x<W+30&&e.y>20&&e.y<H+20);for(const p of S.pt){p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt}S.pt=S.pt.filter(p=>p.life>0);if(sh.hp<=0||sh.cargo<=0)end(false);else if(S.timer>=sec.dur)end(true)}
function damage(d){const sh=S.ship;if(sh.inv>0)return;sh.hp-=d;sh.inv=.25;if(sh.people>0&&Math.random()<.12)sh.people=Math.max(0,sh.people-1)}
function spawn(sec){const r=Math.random();if(r<sec.debris)S.en.push({type:'debris',x:W+8,y:rnd(30,H-18),vx:-rnd(40,78),vy:rnd(-10,10),hp:2,r:rnd(3,6),col:C.yellow,dmg:12,conf:0});else if(r<sec.debris+sec.mine)S.en.push({type:'mine',x:W+8,y:rnd(30,H-18),vx:-rnd(28,50),vy:0,hp:1,r:4,col:C.mag,dmg:18,conf:0});else if(r<sec.debris+sec.mine+sec.shoot)S.en.push({type:'shoot',x:W+8,y:rnd(34,H-22),vx:-30,vy:0,hp:3,r:5,speed:rnd(18,30),col:C.cyan,dmg:16,cd:rnd(.4,1.5),conf:0});else S.en.push({type:'swarm',x:W+8,y:rnd(28,H-18),vx:-60,vy:0,hp:1,r:3,speed:rnd(42,72)+sec.danger*6,col:C.green,dmg:9,conf:0})}
function end(ok){const sh=S.ship,L=loadStats(),base=ok?300:40,cargo=ok?L.sup*120+sh.people*24:Math.floor(L.sup*30+sh.people*6),surv=Math.max(0,Math.floor(sh.hp+sh.cargo)),cr=Math.floor((base+cargo+surv)/100);S.credits+=cr;S.result={ok,cr,cargo,surv};S.mode='result';S.msg=ok?'DELIVERY CONFIRMED':'SIGNAL LOST'}
function result(){if(press('Enter','e')){if(S.result.ok&&S.si<sectors.length-1){S.si++;S.analysis=0;S.budget=5+Math.floor(S.credits/5);S.load=[];S.mode='brief'}else reset()}}
function burst(x,y,col,n){for(let i=0;i<n;i++){const a=rnd(0,Math.PI*2),s=rnd(10,65);S.pt.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rnd(.15,.5),col})}}function spark(x,y,col){burst(x,y,col,3)}
function text(s,x,y,col=C.white){g.fillStyle=col;g.font='6px monospace';g.textBaseline='top';g.fillText(s,x,y)}function frame(t){g.strokeStyle=C.white;g.strokeRect(2,2,W-4,H-4);g.fillStyle=C.black;g.fillRect(5,4,W-10,12);text(t,8,7,C.bw)}function wrap(s,x,y,max,lh,col){let line='',yy=y;for(const w of s.split(' ')){const test=line+w+' ';if(g.measureText(test).width>max&&line){text(line,x,yy,col);line=w+' ';yy+=lh}else line=test}if(line)text(line,x,yy,col)}
function draw(){g.fillStyle=C.black;g.fillRect(0,0,W,H);if(S.mode==='brief')drawBrief();else if(S.mode==='load')drawLoad();else if(S.mode==='run')drawRun();else drawResult();g.globalAlpha=.12;g.fillStyle=C.white;for(let y=0;y<H;y+=4)g.fillRect(0,y,W,1);g.globalAlpha=1;ctx.fillStyle='#000';ctx.fillRect(0,0,768,576);ctx.drawImage(screen,0,0,W,H,0,0,768,576)}
function drawBrief(){const sec=sectors[S.si];frame('NEW FRONTIER 9 / ROUTE BRIEFING');text(sec.name,10,24,sec.col);text(sec.free,10,37);text('ANALYSIS DEPTH: '+S.analysis+'/3   BUDGET: '+S.budget,10,52,C.yellow);text('KNOWN DATA',10,70,C.cyan);text('- fixed route, no detour',16,81);text('- cargo bay capacity: 8 slots',16,91);text('- deeper analysis consumes prep resource',16,101);for(let i=0;i<S.analysis;i++)text('> '+sec.scan[i],10,120+i*12,i===2?C.by:C.green);text('ENTER: spend analysis / proceed',10,166,C.bw);text('BACKSPACE: reduce depth',10,176)}
function drawLoad(){const sec=sectors[S.si];frame('CARGO BAY / PREPARE SHIPMENT');text(sec.name,10,22,sec.col);text('SLOTS: '+S.load.length+'/'+S.slots+'   SPACE: launch',10,34,C.yellow);for(let i=0;i<items.length;i++){const it=items[i],y=52+i*14,sel=i===S.sel;if(sel){g.fillStyle=C.blue;g.fillRect(8,y-1,112,10)}text((sel?'> ':'  ')+it.n,12,y,sel?C.bw:C.white)}const it=items[S.sel];text('ITEM',136,52,C.cyan);wrap(it.d,136,64,108,10,C.white);text('LOADED',136,104,C.cyan);wrap(S.load.map(v=>icon(v.k)).join(' ')||'(empty)',136,116,108,10,C.yellow);const L=loadStats();text('AMMO+'+L.ammo+' SHIELD+'+L.shield+' PEOPLE:'+L.people,10,160,C.green);text('ENTER:add / BACKSPACE:remove / SPACE:launch',10,176,C.bw)}
function icon(k){return{sup:'■',ammo:'A',shield:'S',people:'P',scan:'?',flare:'F',gun:'G'}[k]||'?'}
function drawRun(){const sh=S.ship,sec=sectors[S.si];g.strokeStyle=sec.col;g.strokeRect(2,20,W-4,H-34);g.fillStyle=C.black;g.fillRect(3,21,W-6,H-36);for(const st of S.stars){g.fillStyle=st.s>1?C.white:C.blue;g.fillRect(st.x|0,st.y|0,st.s,st.s)}g.fillStyle=C.blue;g.fillRect(6,8,W-12,5);g.fillStyle=sec.col;g.fillRect(6,8,Math.floor((W-12)*S.timer/sec.dur),5);text('HP '+Math.ceil(sh.hp)+'  CARGO '+Math.ceil(sh.cargo)+'  AMMO '+sh.ammo,8,1);text('F'+sh.flare+' P'+sh.people+'  S'+(S.si+1)+'/'+sectors.length,166,1,C.yellow);g.fillStyle=C.by;for(const b of S.bul)g.fillRect(b.x|0,b.y|0,4,1);for(const e of S.en){g.fillStyle=e.col;if(e.type==='swarm')g.fillRect((e.x-2)|0,(e.y-2)|0,4,4);else if(e.type==='shoot'){g.strokeStyle=e.col;g.strokeRect((e.x-4)|0,(e.y-4)|0,8,8)}else if(e.type==='mine'){g.fillRect((e.x-4)|0,e.y|0,8,1);g.fillRect(e.x|0,(e.y-4)|0,1,8)}else if(e.type==='bolt')g.fillRect((e.x-2)|0,(e.y-1)|0,4,2);else{g.strokeStyle=C.yellow;g.strokeRect((e.x-e.r)|0,(e.y-e.r)|0,e.r*2,e.r*2)}}for(const p of S.pt){g.globalAlpha=clamp(p.life*3,0,1);g.fillStyle=p.col;g.fillRect(p.x|0,p.y|0,1,1)}g.globalAlpha=1;const flick=sh.inv>0&&Math.floor(performance.now()/60)%2===0,x=sh.x|0,y=sh.y|0;g.fillStyle=flick?C.bw:C.bc;g.fillRect(x-5,y-3,8,6);g.fillRect(x+3,y-1,5,2);g.fillStyle=C.yellow;g.fillRect(x-7,y-1,2,2);if(S.en.length>18){g.globalAlpha=.14;g.fillStyle=[C.red,C.mag,C.yellow][Math.floor(Math.random()*3)];for(let yy=24;yy<H-16;yy+=8)for(let xx=0;xx<W;xx+=8)if(Math.random()<.22)g.fillRect(xx,yy,8,8);g.globalAlpha=1}text(sec.name,6,H-11,sec.col)}
function drawResult(){frame('AFTER ACTION REPORT');const r=S.result;text(S.msg,18,34,r.ok?C.bg:C.br);text('CREDITS GAINED: '+r.cr,18,56,C.yellow);text('CARGO VALUE: '+r.cargo,18,70);text('SURVIVAL VALUE: '+r.surv,18,82);text('TOTAL META CREDITS: '+S.credits,18,100,C.cyan);if(r.ok&&S.si<sectors.length-1){text('NEXT SECTOR UNLOCKED.',18,128,C.green);text('ENTER: continue route',18,154,C.bw)}else{text('RUN ARCHIVED.',18,128);text('ENTER: restart prototype',18,154,C.bw)}}
function loop(now){const dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop)}reset();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
